services:
  - type: web
    name: northstar-banking-api
    runtime: docker
    dockerfilePath: ./banking-domain/backend/BankingApi/Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Authentication__Enabled
        value: false
      - key: Cors__AllowedOrigins__0
        sync: false

  - type: web
    name: northstar-banking-ui
    runtime: static
    rootDir: banking-domain/frontend/banking-ui
    buildCommand: npm install && npm run build:render
    staticPublishPath: ./dist/northstar-banking-ui/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_BASE_URL
        sync: false
      - key: OAUTH_ENABLED
        value: false
      - key: OAUTH_ISSUER
        sync: false
      - key: OAUTH_CLIENT_ID
        value: northstar-banking-ui
      - key: OAUTH_SCOPE
        value: openid profile email api://northstar-banking-api/access
      - key: OAUTH_REQUIRE_HTTPS
        value: true
